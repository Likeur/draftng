<div [class]="state.isDark() ? 'bg-zinc-950 text-zinc-50 dark' : 'bg-zinc-50/65 text-zinc-900'" class="h-screen overflow-hidden transition-colors duration-300 font-sans antialiased flex flex-col md:flex-row relative">
  
  <app-sidebar></app-sidebar>

  <!-- Mobile Sidebar Backdrop Overlay -->
  @if (!state.isSidebarCollapsed()) {
    <div 
      (click)="state.toggleSidebar()" 
      class="fixed inset-0 bg-black/45 z-40 md:hidden transition-opacity duration-300 animate-fade-in">
    </div>
  }

  <!-- Main Workspace Content -->
  <div class="flex-grow flex flex-col min-w-0 overflow-hidden">
    
    <!-- Structured Topbar Component -->
    <app-topbar></app-topbar>

    <!-- View Panel Router -->
    <main class="flex-grow p-6 md:p-8 overflow-y-auto min-w-0">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
